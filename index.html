<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>penotes</title>
  <link rel="stylesheet" href="styles.css?v=39">
</head>
<body>
  <div id="app">
    <div id="header">
      <div class="header-left">
        <button id="btn-sidebar-toggle" class="btn-sidebar-toggle" onclick="toggleSidebar()" title="Toggle sidebar">☰</button>
        <span>penotes</span>
      </div>
      <div class="header-center">
        <div class="search-wrap">
          <input type="text" class="header-search" placeholder="Search techniques...">
          <button class="btn-search-filter" id="btn-filter-ready" title="Tool search mode">
            <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M.102 2.268a1.5 1.5 0 0 1 1.956-1.956l2.81 1.023a.5.5 0 0 1 .165.83l-.895.895a.5.5 0 0 0 0 .707l1.994 1.994a.5.5 0 0 0 .707 0l.894-.894a.5.5 0 0 1 .83.165l1.023 2.81a1.5 1.5 0 0 1-1.955 1.955l-2.81-1.023a.5.5 0 0 1-.165-.83l.895-.895a.5.5 0 0 0 0-.707L3.765 4.773a.5.5 0 0 0-.707 0l-.894.894a.5.5 0 0 1-.83-.165zm4.196 9.953L8 8.525l3.702 3.696a.5.5 0 0 1-.707.707L8.72 10.635l-3.727 3.72a.5.5 0 0 1-.707-.707z"/></svg>
          </button>
        </div>
      </div>
      <div class="header-right">
        <div class="session-switcher">
          <button id="btn-session" class="btn btn-ghost btn-sm">+ Session ▾</button>
          <div id="session-menu" class="session-menu"></div>
        </div>
      </div>
    </div>
    <div id="sidebar-overlay" onclick="toggleSidebar()"></div>
    <div id="body">
      <div id="sidebar">
        <div id="tree-container"></div>
      </div>
      <div id="content"></div>
      <div id="right-panel"></div>
    </div>
  </div>

  <div id="toast"></div>
  <input type="file" id="import-session-input" accept=".json" style="display:none" onchange="handleImportFile(this)">

  <!-- Variable Info Modal -->
  <div class="modal-overlay" id="var-modal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="var-modal-title"></span>
        <button class="modal-close" onclick="closeModal('var-modal')">✕</button>
      </div>
      <div class="modal-body" id="var-modal-content"></div>
    </div>
  </div>

  <!-- Add Variable Modal -->
  <div class="modal-overlay" id="add-var-modal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">Add Variable</span>
        <button class="modal-close" onclick="closeModal('add-var-modal')">✕</button>
      </div>
      <div class="modal-body" id="add-var-modal-content"></div>
    </div>
  </div>

  <!-- New Session Modal -->
  <div class="modal-overlay" id="new-session-modal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">New Session</span>
        <button class="modal-close" onclick="closeModal('new-session-modal')">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Session Name</label>
          <input type="text" class="form-input" id="new-session-name" placeholder="e.g. ClientCorp AD Pentest">
        </div>
        <div class="form-group">
          <label class="form-label">Target IP</label>
          <input type="text" class="form-input" id="new-session-target" placeholder="e.g. 10.10.10.5">
        </div>
        <div class="form-group">
          <label class="form-label">Domain</label>
          <input type="text" class="form-input" id="new-session-domain" placeholder="e.g. Muath.local">
        </div>
        <div class="form-actions">
          <button class="btn btn-primary btn-full" id="btn-create-session">Create Session</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/data.js?v=39"></script>
  <script src="js/app.js?v=39"></script>
</body>
</html>
